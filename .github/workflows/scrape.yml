name: Daily Goldback Rate Scraper

on:
  schedule:
    # 17:05 UTC = ~10:05 AM MST (UTC-7) — just after the 10 AM daily update
    - cron: "5 17 * * *"
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: write      # needed to commit updated data/rates.json

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 playwright

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rates.json
          git diff --cached --quiet || git commit -m "chore: update Goldback exchange rate $(date +'%Y-%m-%d')"
          git push
